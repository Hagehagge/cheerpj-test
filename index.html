<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromebook用 CheerpJローカル読み込み</title>
    <script src="./loader.js"></script>
</head>
<body>
    <button id="btn" disabled>CheerpJ初期化中...</button>
    <pre id="output">ここに結果が表示されます</pre>

    <script>
    // ページ読み込み完了後にCheerpJを初期化
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            // loader.jsが読み込めているかチェック
            if (typeof cheerpjInit === 'undefined') {
                throw new Error("loader.jsの読み込みに失敗しています。ファイルが同じ場所にアップロードされているか確認してください。");
            }
            
            // 初期化を実行
            await cheerpjInit();
            
            const btn = document.getElementById('btn');
            btn.textContent = "ローカルファイルを選択して内容を取得";
            btn.disabled = false;
        } catch (err) {
            document.getElementById('output').textContent = "初期化エラー: " + err.message;
            console.error(err);
        }
    });

    // ボタンクリック時の処理
    document.getElementById('btn').addEventListener('click', async () => {
        try {
            // File System Access APIでChromebookのローカルファイルを選択
            const [fileHandle] = await window.showOpenFilePicker();
            const file = await fileHandle.getFile();
            const content = await file.text();
            
            // 【修正点】
            // CheerpJ 3.x/4.x では cheerpOSAddStringFile は廃止されています。
            // 以下のコードはReferenceErrorを引き起こすためコメントアウトしています。
            // await cheerpOSAddStringFile("/files/local_data.txt", content);
            
            // Java側でこのデータを読み込むための正しいアプローチ（CheerpJ 3）：
            // 1. cheerpjRunLibrary を使ってJava側のメソッド(例: processData(String))を呼び出し、contentを引数として渡す
            // 2. JSの File オブジェクト(上記変数 'file')を直接Javaの InputStream などを介して読み込ませる
            
            document.getElementById('output').textContent = "ファイルの読み込みに成功しました。\n(※CheerpJ 3では cheerpOSAddStringFile は使えません。Javaメソッドへの直接受け渡しが必要です。)\n\n【ファイル中身】\n" + content;

        } catch (err) {
            console.error('エラー:', err);
            document.getElementById('output').textContent = "エラー: " + err.message;
        }
    });
    </script>
</body>
</html>
