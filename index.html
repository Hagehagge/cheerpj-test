<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromebook用 CheerpJローカル読み込み</title>
    <!-- 外部URLではなく、同じリポジトリ内の loader.js を直接読み込んでCORSを100%回避 -->
    <script src="./loader.js"></script>
</head>
<body>
    <button id="btn" disabled>CheerpJ初期化中...</button>
    <pre id="output">ここに結果が表示されます</pre>

    <script>
    // ページ読み込み完了後にCheerpJを初期化
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            // loader.jsが読み込めているかチェック
            if (typeof cheerpjInit === 'undefined') {
                throw new Error("loader.jsの読み込みに失敗しています。ファイルが同じ場所にアップロードされているか確認してください。");
            }
            
            // 初期化を実行（CheerpJ 3.0/4.x共通の正しい構文です）
            await cheerpjInit();
            
            const btn = document.getElementById('btn');
            btn.textContent = "ローカルファイルを選択してJavaに渡す";
            btn.disabled = false;
        } catch (err) {
            document.getElementById('output').textContent = "初期化エラー: " + err.message;
            console.error(err);
        }
    });

    // ボタンクリック時の処理
    document.getElementById('btn').addEventListener('click', async () => {
        try {
            // File System Access APIでChromebookのローカルファイルを選択
            const [fileHandle] = await window.showOpenFilePicker();
            const file = await fileHandle.getFile();
            const content = await file.text();
            
            // CheerpJの最新仮想ファイルシステムへ配置
            await cheerpOSAddStringFile("/files/local_data.txt", content);
            
            document.getElementById('output').textContent = "ファイルをJava用仮想パス（/files/local_data.txt）に配置しました。\n\n【ファイル中身】\n" + content;

        } catch (err) {
            console.error('エラー:', err);
            document.getElementById('output').textContent = "エラー: " + err.message;
        }
    });
    </script>
</body>
</html>
